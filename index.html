<!doctype html>
<html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eid Trip Bus Tracker</title>
  <script src="/_sdk/data_sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .app-wrapper {
      width: 100%;
      max-width: 900px;
      background: white;
      border-radius: 25px;
      box-shadow: 0 20px 60px rgba(102, 126, 234, 0.4);
      overflow: hidden;
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '🎉';
      position: absolute;
      font-size: 80px;
      opacity: 0.12;
      top: -15px;
      right: 15px;
      animation: float 3s ease-in-out infinite;
    }

    .header::after {
      content: '✨';
      position: absolute;
      font-size: 60px;
      opacity: 0.1;
      bottom: -5px;
      left: 20px;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    .header h1 {
      font-size: 2em;
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      font-weight: 700;
    }

    .header p {
      font-size: 0.9em;
      color: #e8d5ff;
      font-weight: 500;
    }

    /* Main Content */
    .content {
      padding: 25px 15px;
    }

    .section {
      margin-bottom: 25px;
    }

    .section-title {
      font-size: 1.2em;
      color: #667eea;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
    }

    /* Form Group */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 600;
      font-size: 0.95em;
    }

    select, input[type="text"], textarea {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      transition: all 0.3s ease;
    }

    select:focus, input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 150px;
    }

    /* Bus Stops Grid */
    .stops-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
    }

    .stop-btn {
      padding: 12px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
      color: #333;
      text-align: center;
      font-size: 0.9em;
    }

    .stop-btn:hover {
      border-color: #667eea;
      background: #f5f3ff;
      transform: translateY(-2px);
    }

    .stop-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-color: #667eea;
      transform: scale(1.05);
    }

    /* Button */
    .btn {
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
      text-align: center;
      font-family: 'Poppins', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f5f3ff;
      color: #667eea;
      border: 2px solid #667eea;
      width: 100%;
    }

    .btn-secondary:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #ff6b6b;
      color: white;
      width: 100%;
    }

    .btn-danger:hover {
      background: #ff5252;
      transform: translateY(-2px);
    }

    /* Message */
    .message {
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
      animation: slideIn 0.3s ease;
      font-weight: 500;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      border: 2px solid #c3e6cb;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      border: 2px solid #f5c6cb;
      display: block;
    }

    @keyframes slideIn {
      from {
        transform: translateY(-10px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* Dashboard Table */
    .dashboard-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    .dashboard-table thead {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .dashboard-table th, .dashboard-table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #e0e0e0;
      font-size: 0.95em;
    }

    .dashboard-table tr:hover {
      background: #f9f7ff;
    }

    .stop-count {
      font-size: 1.3em;
      font-weight: bold;
      color: #667eea;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 5px;
      margin-bottom: 25px;
      border-bottom: 2px solid #e0e0e0;
      overflow-x: auto;
      padding-bottom: 0;
    }

    .tab {
      padding: 12px 18px;
      border: none;
      background: none;
      cursor: pointer;
      font-weight: 600;
      color: #999;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      font-size: 0.95em;
      white-space: nowrap;
    }

    .tab:hover {
      color: #667eea;
    }

    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Staff Item */
    .staff-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      background: #f9f7ff;
      border-radius: 12px;
      margin-bottom: 12px;
      border-left: 4px solid #667eea;
      gap: 10px;
    }

    .staff-info {
      flex: 1;
    }

    .staff-name {
      font-weight: 600;
      color: #333;
      font-size: 0.95em;
    }

    .staff-stop {
      color: #666;
      font-size: 0.85em;
      margin-top: 3px;
    }

    /* Admin Sections */
    .admin-section {
      background: linear-gradient(135deg, #f5f3ff 0%, #f0e6ff 100%);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 2px solid #667eea;
    }

    .admin-section h3 {
      margin-bottom: 15px;
      color: #667eea;
      font-size: 1.05em;
      font-weight: 700;
    }

    .admin-section p {
      color: #666;
      font-size: 0.85em;
      margin-bottom: 12px;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .app-wrapper {
        border-radius: 20px;
      }

      .header {
        padding: 25px 15px;
      }

      .header h1 {
        font-size: 1.6em;
      }

      .header p {
        font-size: 0.85em;
      }

      .content {
        padding: 20px 12px;
      }

      .stops-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .tabs {
        gap: 3px;
      }

      .tab {
        padding: 10px 12px;
        font-size: 0.85em;
      }

      .section-title {
        font-size: 1em;
      }

      .btn {
        padding: 12px 24px;
        font-size: 0.95em;
      }

      label {
        font-size: 0.9em;
      }

      select, input[type="text"], textarea {
        padding: 11px 13px;
        font-size: 14px;
      }

      .staff-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .dashboard-table th, .dashboard-table td {
        padding: 10px;
        font-size: 0.85em;
      }

      .form-group {
        margin-bottom: 15px;
      }

      .admin-section {
        padding: 15px;
        border-radius: 10px;
      }
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 1.4em;
      }

      .stops-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
      }

      .stop-btn {
        padding: 10px;
        font-size: 0.85em;
      }

      .tabs {
        gap: 2px;
      }

      .tab {
        padding: 8px 10px;
        font-size: 0.8em;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
 </head>
 <body>
  <div class="app-wrapper"><!-- Header -->
   <div class="header">
    <h1>🎊 Eid Trip Bus Tracker</h1>
    <p>Colombo → Kandy Journey</p>
   </div><!-- Main Content -->
   <div class="content"><!-- Tabs -->
    <div class="tabs"><button class="tab active" data-tab="booking">📱 Book Your Stop</button> <button class="tab" data-tab="dashboard">📊 Live Dashboard</button> <button class="tab" data-tab="admin">⚙️ Admin</button>
    </div><!-- Tab 1: Booking -->
    <div id="booking" class="tab-content active">
     <div class="section">
      <div class="message" id="message"></div>
      <div class="form-group"><label>👤 Select Your Name</label> <select id="staffSelect"> <option value="">-- Choose your name --</option> <option value="ROOHUL HAQ">ROOHUL HAQ</option> <option value="AASHIK">AASHIK</option> <option value="FAZLUR RAHMAN">FAZLUR RAHMAN</option> <option value="ABDUR RAHMAN">ABDUR RAHMAN</option> <option value="AC MUNEER">AC MUNEER</option> <option value="FM UMAIR">FM UMAIR</option> <option value="SHADIK">SHADIK</option> <option value="LUKMAN">LUKMAN</option> <option value="SAMEER">SAMEER</option> <option value="SM UMAIR">SM UMAIR</option> <option value="KM UMAIR">KM UMAIR</option> <option value="MAHIR MOULAVI">MAHIR MOULAVI</option> <option value="RIZVI MOULAVI">RIZVI MOULAVI</option> <option value="ASHRAF">ASHRAF</option> <option value="AROOS">AROOS</option> <option value="F AJMAL">F AJMAL</option> <option value="S AJMAL">S AJMAL</option> <option value="HAMMAD">HAMMAD</option> <option value="SHIYAM">SHIYAM</option> <option value="I M AMEEN">I M AMEEN</option> <option value="ABDUL AZEEZ FAZLUL">ABDUL AZEEZ FAZLUL</option> <option value="IRFAN">IRFAN</option> <option value="AC MUSHARRAF">AC MUSHARRAF</option> <option value="AKRAM MULAAFAR">AKRAM MULAAFAR</option> <option value="K R AASHIK">K R AASHIK</option> <option value="SHAKIR">SHAKIR</option> <option value="ABDUL QAIYOOM">ABDUL QAIYOOM</option> <option value="SAKEER">SAKEER</option> <option value="ZAKARIYYA">ZAKARIYYA</option> <option value="ABDULLA MOVLAVI">ABDULLA MOVLAVI</option> <option value="HASAN">HASAN</option> <option value="UMAR">UMAR</option> <option value="SHIHAM">SHIHAM</option> <option value="ASHROOQ">ASHROOQ</option> <option value="OTHER">✏️ Other / Add my name</option> </select>
      </div>
      <div class="form-group" id="customNameGroup" style="display: none;"><label>📝 Enter Your Name</label> <input type="text" id="customName" placeholder="Type your name...">
      </div>
      <div class="form-group"><label>🚌 Select Your Bus Stop</label>
       <div class="stops-grid" id="stopsGrid"></div>
      </div><button class="btn btn-primary" id="confirmBtn">✓ Confirm My Stop</button>
     </div>
    </div><!-- Tab 2: Dashboard -->
    <div id="dashboard" class="tab-content">
     <div class="section">
      <h2 class="section-title">📊 Live Summary</h2>
      <table class="dashboard-table">
       <thead>
        <tr>
         <th>Bus Stop</th>
         <th>Staff Count</th>
        </tr>
       </thead>
       <tbody id="dashboardTable">
        <tr>
         <td colspan="2" style="text-align: center; color: #999;">No bookings yet</td>
        </tr>
       </tbody>
      </table><button class="btn btn-secondary" id="generatePdfBtn" style="margin-top: 20px;">📄 Download PDF Report</button>
     </div>
    </div><!-- Tab 3: Admin -->
    <div id="admin" class="tab-content">
     <div class="section"><!-- Add Booking Section -->
      <div class="admin-section">
       <h3>➕ Manually Add Stop</h3>
       <div class="form-group"><label>Staff Name</label> <input type="text" id="adminStaffName" placeholder="Enter staff name...">
       </div>
       <div class="form-group"><label>Bus Stop</label> <select id="adminStopSelect"> <option value="">-- Select a stop --</option> </select>
       </div><button class="btn btn-secondary" id="adminAddBtn">✓ Add Booking</button>
      </div><!-- Manage Stops Section -->
      <div class="admin-section">
       <h3>📍 Manage Bus Stops</h3>
       <p>💡 Edit stops below - add new stops, remove unwanted ones, or reorder them (one per line)</p>
       <div class="form-group"><textarea id="stopsTextarea" placeholder="Enter bus stops..."></textarea>
       </div><button class="btn btn-secondary" id="updateStopsBtn">✓ Save Stops</button> <button class="btn btn-danger" id="resetBtn" style="margin-top: 10px;">🔄 Reset All Bookings</button>
      </div><!-- All Bookings -->
      <h3 style="margin-top: 25px; margin-bottom: 15px; color: #667eea; font-weight: 700;">All Bookings</h3>
      <div id="adminList"></div>
     </div>
    </div>
   </div>
  </div>
  <script>
    const STOPS = [
      'Dehiwala',
      'Mount Lavinia',
      'Moratuwa',
      'Panadura',
      'Kalutara',
      'Aluthgama',
      'Bentota',
      'Ambalangoda',
      'Galle',
      'Matara',
      'Tangalle',
      'Hambantota',
      'Wellawaya',
      'Badulla',
      'Mahiyanganaya',
      'Galaha',
      'Gelioya',
      'Kandy',
      'Deltota'
    ];

    let currentData = [];
    let selectedStop = null;

    // Initialize Data SDK
    const dataHandler = {
      onDataChanged(data) {
        currentData = data;
        renderDashboard();
        renderAdmin();
      }
    };

    async function initializeApp() {
      await window.dataSdk.init(dataHandler);
      renderStops();
      updateStopsTextarea();
      updateStopDropdowns();
    }

    // Render bus stops
    function renderStops() {
      const grid = document.getElementById('stopsGrid');
      grid.innerHTML = STOPS.map(stop => `
        <button class="stop-btn" data-stop="${stop}" onclick="selectStop('${stop}')">
          ${stop}
        </button>
      `).join('');
    }

    // Select stop
    function selectStop(stop) {
      selectedStop = stop;
      document.querySelectorAll('.stop-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`[data-stop="${stop}"]`).classList.add('active');
    }

    // Staff selection
    document.getElementById('staffSelect').addEventListener('change', (e) => {
      const customGroup = document.getElementById('customNameGroup');
      if (e.target.value === 'OTHER') {
        customGroup.style.display = 'block';
      } else {
        customGroup.style.display = 'none';
      }
    });

    // Confirm booking
    document.getElementById('confirmBtn').addEventListener('click', async () => {
      const staffSelect = document.getElementById('staffSelect');
      const customName = document.getElementById('customName').value.trim();
      const staffName = staffSelect.value === 'OTHER' ? customName : staffSelect.value;

      if (!staffName) {
        showMessage('Please enter your name', 'error');
        return;
      }

      if (!selectedStop) {
        showMessage('Please select a bus stop', 'error');
        return;
      }

      // Check if staff already exists and delete old record
      const existing = currentData.find(item => item.staff_name === staffName);
      if (existing) {
        await window.dataSdk.delete(existing);
      }

      // Create new booking
      const result = await window.dataSdk.create({
        staff_name: staffName,
        bus_stop: selectedStop,
        timestamp: new Date().toISOString()
      });

      if (result.isOk) {
        showMessage(`✓ ${staffName} - ${selectedStop} confirmed!`, 'success');
        document.getElementById('staffSelect').value = '';
        document.getElementById('customName').value = '';
        selectedStop = null;
        document.querySelectorAll('.stop-btn').forEach(btn => {
          btn.classList.remove('active');
        });
      }
    });

    // Render dashboard
    function renderDashboard() {
      const summary = {};
      currentData.forEach(item => {
        if (!summary[item.bus_stop]) {
          summary[item.bus_stop] = [];
        }
        summary[item.bus_stop].push(item.staff_name);
      });

      const tbody = document.getElementById('dashboardTable');
      if (Object.keys(summary).length === 0) {
        tbody.innerHTML = '<tr><td colspan="2" style="text-align: center; color: #999;">No bookings yet</td></tr>';
        return;
      }

      tbody.innerHTML = STOPS
        .filter(stop => summary[stop])
        .map(stop => `
          <tr>
            <td>${stop}</td>
            <td><span class="stop-count">${summary[stop].length}</span></td>
          </tr>
        `).join('');
    }

    // Render admin
    function renderAdmin() {
      const adminList = document.getElementById('adminList');
      if (currentData.length === 0) {
        adminList.innerHTML = '<p style="color: #999; text-align: center;">No bookings</p>';
        return;
      }

      adminList.innerHTML = currentData.map(item => `
        <div class="staff-item">
          <div class="staff-info">
            <div class="staff-name">${item.staff_name}</div>
            <div class="staff-stop">→ ${item.bus_stop}</div>
          </div>
          <button class="btn btn-danger" onclick="deleteStaff('${item.__backendId}')" style="padding: 10px 15px; font-size: 0.9em;">Delete</button>
        </div>
      `).join('');
    }

    // Delete staff with confirmation
    function deleteStaff(id) {
      const item = currentData.find(d => d.__backendId === id);
      if (!item) return;

      // Create inline confirmation
      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = 'Sure? Click again';
      btn.style.background = '#ff5252';

      const confirmDelete = async () => {
        await window.dataSdk.delete(item);
        btn.removeEventListener('click', confirmDelete);
        btn.addEventListener('click', () => deleteStaff(id));
      };

      btn.removeEventListener('click', deleteStaff);
      btn.addEventListener('click', confirmDelete);

      setTimeout(() => {
        btn.textContent = originalText;
        btn.removeEventListener('click', confirmDelete);
        btn.addEventListener('click', () => deleteStaff(id));
      }, 3000);
    }

    // Admin: Manually add booking
    document.getElementById('adminAddBtn').addEventListener('click', async () => {
      const adminStaffName = document.getElementById('adminStaffName').value.trim();
      const adminStop = document.getElementById('adminStopSelect').value;

      if (!adminStaffName) {
        showMessage('Please enter staff name', 'error');
        return;
      }

      if (!adminStop) {
        showMessage('Please select a bus stop', 'error');
        return;
      }

      // Check if staff already exists and delete old record
      const existing = currentData.find(item => item.staff_name === adminStaffName);
      if (existing) {
        await window.dataSdk.delete(existing);
      }

      // Create new booking
      const result = await window.dataSdk.create({
        staff_name: adminStaffName,
        bus_stop: adminStop,
        timestamp: new Date().toISOString()
      });

      if (result.isOk) {
        showMessage(`✓ ${adminStaffName} added to ${adminStop}!`, 'success');
        document.getElementById('adminStaffName').value = '';
        document.getElementById('adminStopSelect').value = '';
      }
    });

    // Reset all
    document.getElementById('resetBtn').addEventListener('click', async () => {
      const btn = event.target;
      const originalText = btn.textContent;
      btn.textContent = '⚠️ Click again to confirm reset';
      btn.style.background = '#ff5252';

      const confirmReset = async () => {
        for (const item of currentData) {
          await window.dataSdk.delete(item);
        }
        showMessage('✓ All bookings reset', 'success');
        btn.removeEventListener('click', confirmReset);
        btn.addEventListener('click', () => {
          btn.textContent = originalText;
          btn.style.background = '';
          document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('resetBtn').click();
          });
        });
      };

      btn.removeEventListener('click', () => {});
      btn.addEventListener('click', confirmReset);

      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = '';
      }, 3000);
    });

    // Update stops from textarea
    function updateStopsTextarea() {
      const textarea = document.getElementById('stopsTextarea');
      textarea.value = STOPS.join('\n');
    }

    document.getElementById('updateStopsBtn').addEventListener('click', () => {
      const textarea = document.getElementById('stopsTextarea');
      const newStops = textarea.value
        .split('\n')
        .map(s => s.trim())
        .filter(s => s.length > 0);

      if (newStops.length === 0) {
        showMessage('Please add at least one stop', 'error');
        return;
      }

      // Update STOPS array
      STOPS.length = 0;
      STOPS.push(...newStops);

      // Update dropdowns and displays
      updateStopDropdowns();
      renderStops();
      renderDashboard();

      showMessage('✓ Bus stops updated successfully!', 'success');
    });

    function updateStopDropdowns() {
      const adminSelect = document.getElementById('adminStopSelect');
      adminSelect.innerHTML = '<option value="">-- Select a stop --</option>' +
        STOPS.map(stop => `<option value="${stop}">${stop}</option>`).join('');
    }

    // Generate PDF
    document.getElementById('generatePdfBtn').addEventListener('click', () => {
      const summary = {};
      currentData.forEach(item => {
        if (!summary[item.bus_stop]) {
          summary[item.bus_stop] = [];
        }
        summary[item.bus_stop].push(item.staff_name);
      });

      const html = `
        <div style="font-family: 'Poppins', Arial; padding: 20px;">
          <h1 style="text-align: center; color: #667eea;">🎊 Eid Trip Staff Report</h1>
          <p style="text-align: center; color: #666;">Date: ${new Date().toLocaleDateString()}</p>
          <hr style="margin: 20px 0;">
          <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
            <thead>
              <tr style="background: #667eea; color: white;">
                <th style="border: 1px solid #ddd; padding: 12px;">Bus Stop</th>
                <th style="border: 1px solid #ddd; padding: 12px;">Count</th>
                <th style="border: 1px solid #ddd; padding: 12px;">Staff Names</th>
              </tr>
            </thead>
            <tbody>
              ${STOPS
                .filter(stop => summary[stop])
                .map(stop => `
                  <tr>
                    <td style="border: 1px solid #ddd; padding: 12px;">${stop}</td>
                    <td style="border: 1px solid #ddd; padding: 12px; text-align: center;">${summary[stop].length}</td>
                    <td style="border: 1px solid #ddd; padding: 12px;">${summary[stop].join(', ')}</td>
                  </tr>
                `)
                .join('')}
            </tbody>
          </table>
          <p style="margin-top: 20px; font-weight: bold; color: #667eea;">Total Staff: ${currentData.length}</p>
        </div>
      `;

      const opt = {
        margin: 10,
        filename: 'Eid_Trip_Report.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
      };
      html2pdf().set(opt).from(html).save();
    });

    // Show message
    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      setTimeout(() => {
        msg.classList.remove('success', 'error');
      }, 3000);
    }

    // Tab switching
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tabName).classList.add('active');
      });
    });

    // Start app
    initializeApp();
  </script>
